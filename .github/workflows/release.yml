name: Release ZIP

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set package metadata
        shell: pwsh
        run: |
          $archiveName = "${{ github.event.repository.name }}.zip"
          $releaseTag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Stage release files
        shell: pwsh
        run: |
          $stagingRoot = Join-Path $env:RUNNER_TEMP "release"

          if (Test-Path -LiteralPath $stagingRoot) {
            Remove-Item -LiteralPath $stagingRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $stagingRoot -Force | Out-Null

          Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Force |
            Where-Object { $_.Name -notin @(".git", ".github") } |
            ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination $stagingRoot -Recurse -Force
            }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $stagingRoot = Join-Path $env:RUNNER_TEMP "release"
          $archivePath = Join-Path $env:RUNNER_TEMP $env:ARCHIVE_NAME
          $archiveItems = Get-ChildItem -LiteralPath $stagingRoot -Force

          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }

          if ($archiveItems.Count -eq 0) {
            throw "No files were staged for release."
          }

          Compress-Archive -LiteralPath $archiveItems.FullName -DestinationPath $archivePath -Force
          "ARCHIVE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
